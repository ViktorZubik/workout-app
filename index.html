<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тренировки</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Тренировки">
<link rel="apple-touch-icon" href="icon-192.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100dvh}
.app{max-width:480px;margin:0 auto;padding:16px;padding-bottom:90px}
h1{font-size:20px;font-weight:600}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:8px}
.header-right{display:flex;gap:8px}
.icon-btn{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:7px 12px;font-size:13px;color:#555;cursor:pointer;display:flex;align-items:center;gap:5px}
.icon-btn:active{background:#f0f0f0}

/* Day tabs */
.day-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.day-tab{flex-shrink:0;padding:7px 16px;border-radius:10px;border:1.5px solid #e5e5e5;background:#fff;font-size:13px;font-weight:500;color:#888;cursor:pointer;transition:all 0.15s}
.day-tab.active{background:#185FA5;color:#fff;border-color:#185FA5}
.day-tab.done{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7}

/* Progress */
.progress-wrap{height:4px;background:#e5e5e5;border-radius:2px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;background:#185FA5;border-radius:2px;transition:width 0.3s}

/* Exercise card */
.ex-card{background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:16px;margin-bottom:12px}
.ex-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.ex-name{font-size:15px;font-weight:600;color:#1a1a1a}
.ex-muscle{font-size:12px;color:#999;margin-top:3px}
.edit-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:18px;padding:0 0 0 8px;line-height:1}
.edit-btn:active{color:#888}

/* Sets grid */
.sets-grid{display:grid;grid-template-columns:28px 1fr 1fr 36px;gap:6px;align-items:center}
.col-hdr{font-size:11px;color:#aaa;text-align:center;padding-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.03em}
.set-num{font-size:13px;color:#bbb;text-align:center;line-height:36px}
.set-input{width:100%;height:36px;border:1.5px solid #e8e8e8;border-radius:10px;padding:0 8px;font-size:15px;font-weight:500;text-align:center;background:#fafafa;color:#1a1a1a;outline:none;-moz-appearance:textfield}
.set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none}
.set-input:focus{border-color:#185FA5;background:#fff}
.set-input.done-input{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32}
.check-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #e5e5e5;background:#fafafa;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all 0.15s;font-size:16px}
.check-btn:active{transform:scale(0.92)}
.check-btn.checked{background:#e8f5e9;border-color:#a5d6a7}
.add-set-btn{margin-top:10px;width:100%;padding:8px;border:1.5px dashed #e0e0e0;border-radius:10px;background:none;color:#aaa;font-size:13px;cursor:pointer;font-weight:500}
.add-set-btn:active{background:#f5f5f5}

/* Finish bar */
.finish-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 20px;background:rgba(245,245,245,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid #e8e8e8}
.finish-bar-inner{max-width:480px;margin:0 auto}
.finish-btn{width:100%;padding:14px;border-radius:14px;border:none;background:#185FA5;color:#fff;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:0.01em}
.finish-btn:active{opacity:0.88}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

/* History */
.hist-card{background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:16px;margin-bottom:12px}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hist-name{font-size:15px;font-weight:600}
.hist-date{font-size:12px;color:#aaa}
.hist-stats{display:flex;gap:20px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.hist-stat-val{font-size:20px;font-weight:600;color:#1a1a1a}
.hist-stat-lbl{font-size:11px;color:#aaa;margin-top:1px}
.hist-ex-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f5;color:#888}
.hist-ex-row:last-child{border:none}
.hist-ex-row span:first-child{color:#1a1a1a;font-weight:500}
.empty-state{text-align:center;padding:60px 20px;color:#bbb;font-size:15px}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:480px}
.modal h2{font-size:17px;font-weight:600;margin-bottom:16px}
.modal input{width:100%;height:44px;border:1.5px solid #e8e8e8;border-radius:12px;padding:0 14px;font-size:15px;outline:none;margin-bottom:10px}
.modal input:focus{border-color:#185FA5}
.modal-btns{display:flex;gap:10px;margin-top:6px}
.modal-btns button{flex:1;height:44px;border-radius:12px;border:1.5px solid #e5e5e5;background:#fff;font-size:15px;font-weight:500;cursor:pointer}
.modal-btns .primary{background:#185FA5;color:#fff;border-color:#185FA5}

/* Back header */
.back-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-top:8px}
.back-btn{background:none;border:none;cursor:pointer;color:#185FA5;font-size:15px;font-weight:500;padding:0;display:flex;align-items:center;gap:4px}

/* Screen toggle */
.screen{display:none}
.screen.active{display:block}
</style>
</head>
<body>

<div id="toastEl" class="toast"></div>

<!-- Main screen -->
<div id="mainScreen" class="screen active">
<div class="app">
  <div class="header">
    <h1>💪 Тренировки</h1>
    <div class="header-right">
      <button class="icon-btn" onclick="showHistory()">📋 История</button>
    </div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="exerciseList"></div>
</div>
<div class="finish-bar">
  <div class="finish-bar-inner">
    <button class="finish-btn" onclick="finishWorkout()">✓ Завершить тренировку</button>
  </div>
</div>
</div>

<!-- History screen -->
<div id="histScreen" class="screen">
<div class="app">
  <div class="back-header">
    <button class="back-btn" onclick="showMain()">← Назад</button>
    <h1>История</h1>
  </div>
  <div id="histContent"></div>
</div>
</div>

<!-- Edit modal -->
<div class="modal-bg" id="editModal" onclick="closeModal(event)">
  <div class="modal">
    <h2>Изменить упражнение</h2>
    <input id="editName" type="text" placeholder="Название упражнения">
    <input id="editMuscle" type="text" placeholder="Группа мышц">
    <div class="modal-btns">
      <button onclick="closeModal()">Отмена</button>
      <button class="primary" onclick="saveModal()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const PROGRAM = {
  days: [
    { name: "День A", label: "A", exercises: [
      { id: "a_squat", name: "Приседания со штангой", muscle: "Ноги / квадрицепс", sets: 3, reps: 5, weight: 60 },
      { id: "a_bench", name: "Жим лёжа", muscle: "Грудь / трицепс", sets: 3, reps: 5, weight: 50 },
      { id: "a_row",   name: "Тяга штанги в наклоне", muscle: "Спина / бицепс", sets: 3, reps: 5, weight: 40 }
    ]},
    { name: "День B", label: "B", exercises: [
      { id: "b_squat", name: "Приседания со штангой", muscle: "Ноги / квадрицепс", sets: 3, reps: 5, weight: 60 },
      { id: "b_ohp",   name: "Жим стоя", muscle: "Плечи / трицепс", sets: 3, reps: 5, weight: 35 },
      { id: "b_dl",    name: "Становая тяга", muscle: "Спина / ноги", sets: 1, reps: 5, weight: 80 }
    ]},
    { name: "День C", label: "C", exercises: [
      { id: "c_squat", name: "Приседания со штангой", muscle: "Ноги / квадрицепс", sets: 3, reps: 5, weight: 60 },
      { id: "c_bench", name: "Жим лёжа", muscle: "Грудь / трицепс", sets: 3, reps: 5, weight: 50 },
      { id: "c_row",   name: "Тяга штанги в наклоне", muscle: "Спина / бицепс", sets: 3, reps: 5, weight: 40 }
    ]}
  ]
};

let state = JSON.parse(localStorage.getItem('wt_v2') || 'null') || { activeDay: 0, sessions: {}, current: {} };
let editTarget = null;

function save() { localStorage.setItem('wt_v2', JSON.stringify(state)); }
function today() { return new Date().toISOString().slice(0, 10); }

function initDay(di) {
  if (!state.current[di]) {
    state.current[di] = PROGRAM.days[di].exercises.map(ex => ({
      id: ex.id, name: ex.name, muscle: ex.muscle,
      sets: Array.from({ length: ex.sets }, () => ({ reps: ex.reps, weight: ex.weight, done: false }))
    }));
    save();
  }
}

function renderTabs() {
  document.getElementById('dayTabs').innerHTML = PROGRAM.days.map((d, i) => {
    const isDone = state.sessions[today() + '-' + i];
    return `<button class="day-tab ${state.activeDay === i ? 'active' : ''} ${isDone ? 'done' : ''}" onclick="switchDay(${i})">${d.label}${isDone ? ' ✓' : ''}</button>`;
  }).join('');
}

function renderExercises() {
  const di = state.activeDay;
  initDay(di);
  const exs = state.current[di];
  let total = 0, done = 0;
  exs.forEach(ex => ex.sets.forEach(s => { total++; if (s.done) done++; }));
  document.getElementById('progressFill').style.width = total ? Math.round(done / total * 100) + '%' : '0%';

  document.getElementById('exerciseList').innerHTML = exs.map((ex, ei) => `
    <div class="ex-card">
      <div class="ex-header">
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-muscle">${ex.muscle}</div>
        </div>
        <button class="edit-btn" onclick="openEdit(${di},${ei})" aria-label="Изменить">✏️</button>
      </div>
      <div class="sets-grid">
        <div class="col-hdr">#</div>
        <div class="col-hdr">Повт</div>
        <div class="col-hdr">Вес кг</div>
        <div class="col-hdr">✓</div>
        ${ex.sets.map((s, si) => `
          <div class="set-num">${si + 1}</div>
          <input class="set-input ${s.done ? 'done-input' : ''}" type="number" inputmode="decimal" value="${s.reps}" min="1" max="99"
            onchange="upd(${di},${ei},${si},'reps',this.value)">
          <input class="set-input ${s.done ? 'done-input' : ''}" type="number" inputmode="decimal" value="${s.weight}" min="0" max="999" step="2.5"
            onchange="upd(${di},${ei},${si},'weight',this.value)">
          <button class="check-btn ${s.done ? 'checked' : ''}" onclick="toggleSet(${di},${ei},${si})" aria-label="Отметить">
            ${s.done ? '✅' : '⬜'}
          </button>
        `).join('')}
      </div>
      <button class="add-set-btn" onclick="addSet(${di},${ei})">+ Добавить подход</button>
    </div>
  `).join('');
}

function switchDay(i) { state.activeDay = i; save(); renderTabs(); renderExercises(); }

function upd(di, ei, si, field, val) {
  state.current[di][ei].sets[si][field] = parseFloat(val) || 0;
  save();
}

function toggleSet(di, ei, si) {
  state.current[di][ei].sets[si].done ^= 1;
  save(); renderExercises(); renderTabs();
}

function addSet(di, ei) {
  const sets = state.current[di][ei].sets;
  const last = sets[sets.length - 1];
  sets.push({ reps: last.reps, weight: last.weight, done: false });
  save(); renderExercises();
}

function openEdit(di, ei) {
  editTarget = { di, ei };
  const ex = state.current[di][ei];
  document.getElementById('editName').value = ex.name;
  document.getElementById('editMuscle').value = ex.muscle;
  document.getElementById('editModal').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('editModal')) {
    document.getElementById('editModal').classList.remove('open');
  }
}
function saveModal() {
  if (!editTarget) return;
  const { di, ei } = editTarget;
  const name = document.getElementById('editName').value.trim();
  const muscle = document.getElementById('editMuscle').value.trim();
  if (name) state.current[di][ei].name = name;
  if (muscle) state.current[di][ei].muscle = muscle;
  save(); closeModal(); renderExercises();
}

function finishWorkout() {
  const di = state.activeDay;
  const exs = state.current[di];
  let totalSets = 0, totalVol = 0;
  exs.forEach(ex => ex.sets.forEach(s => { if (s.done) { totalSets++; totalVol += s.reps * s.weight; } }));
  if (totalSets === 0) { showToast('Отметь хотя бы один подход ✓'); return; }
  const key = today() + '-' + di;
  state.sessions[key] = {
    date: today(), dayIdx: di, dayName: PROGRAM.days[di].name,
    totalSets, totalVol, exercises: JSON.parse(JSON.stringify(exs))
  };
  delete state.current[di];
  save();
  showToast('Тренировка сохранена 💪');
  setTimeout(() => { initDay(di); renderTabs(); renderExercises(); }, 1200);
}

function showToast(msg) {
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function showHistory() {
  document.getElementById('mainScreen').classList.remove('active');
  document.getElementById('histScreen').classList.add('active');
  const sessions = Object.values(state.sessions).sort((a, b) => b.date.localeCompare(a.date));
  if (!sessions.length) {
    document.getElementById('histContent').innerHTML = '<div class="empty-state">Пока нет завершённых тренировок</div>';
    return;
  }
  document.getElementById('histContent').innerHTML = sessions.map(s => `
    <div class="hist-card">
      <div class="hist-top">
        <div class="hist-name">${s.dayName}</div>
        <div class="hist-date">${s.date}</div>
      </div>
      <div class="hist-stats">
        <div>
          <div class="hist-stat-val">${s.totalSets}</div>
          <div class="hist-stat-lbl">подходов</div>
        </div>
        <div>
          <div class="hist-stat-val">${(s.totalVol / 1000).toFixed(1)}т</div>
          <div class="hist-stat-lbl">объём</div>
        </div>
      </div>
      ${s.exercises.map(ex => `
        <div class="hist-ex-row">
          <span>${ex.name}</span>
          <span>${ex.sets.filter(x => x.done).map(x => x.reps + '×' + x.weight).join(', ')}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function showMain() {
  document.getElementById('histScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

renderTabs();
renderExercises();
</script>
</body>
</html>
