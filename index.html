<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тренировки</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Тренировки">
<link rel="apple-touch-icon" href="icon-192.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100dvh}
.app{max-width:480px;margin:0 auto;padding:16px;padding-bottom:32px}
h1{font-size:20px;font-weight:600}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-top:8px}
.icon-btn{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:7px 12px;font-size:13px;color:#555;cursor:pointer;display:flex;align-items:center;gap:5px}
.icon-btn:active{background:#f0f0f0}
.day-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.day-tab{padding:7px 14px;border-radius:10px;border:1.5px solid #e5e5e5;background:#fff;font-size:13px;font-weight:500;color:#888;cursor:pointer;transition:all 0.15s}
.day-tab.active{color:#fff;border-color:transparent}
.day-tab.done{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7}
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:9px 14px;background:#fff;border-radius:12px;border:1px solid #e8e8e8}
.date-row label{font-size:12px;color:#999;white-space:nowrap}
.date-row input[type=date]{border:none;background:transparent;font-size:14px;font-weight:500;color:#1a1a1a;outline:none;flex:1}
.progress-wrap{height:4px;background:#e5e5e5;border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width 0.3s}
.ex-card{background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:14px;margin-bottom:10px}
.ex-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px}
.ex-name{font-size:15px;font-weight:600;color:#1a1a1a}
.ex-muscle{font-size:12px;color:#999;margin-top:3px}
.replace-btn{background:none;border:none;cursor:pointer;color:#bbb;font-size:20px;padding:0;line-height:1;flex-shrink:0}
.replace-btn:active{color:#555}
.sel-wrap{display:none;margin-bottom:12px;padding:10px;background:#f8f8f8;border-radius:10px}
.sel-wrap.open{display:block}
.sel-wrap select{width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:8px 10px;font-size:14px;background:#fff;color:#1a1a1a;outline:none;margin-bottom:8px}
.sel-actions{display:flex;gap:8px}
.sel-actions button{flex:1;padding:8px;border-radius:8px;border:1.5px solid #e0e0e0;background:#fff;font-size:13px;font-weight:500;color:#555;cursor:pointer}
.sel-actions .ok{background:#185FA5;color:#fff;border-color:#185FA5}
.sets-grid{display:grid;grid-template-columns:28px 1fr 1fr 36px;gap:6px;align-items:center}
.col-hdr{font-size:11px;color:#aaa;text-align:center;padding-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.03em}
.set-num{font-size:13px;color:#ccc;text-align:center;line-height:36px}
.set-input{width:100%;height:36px;border:1.5px solid #e8e8e8;border-radius:10px;padding:0 8px;font-size:15px;font-weight:500;text-align:center;background:#fafafa;color:#1a1a1a;outline:none;-moz-appearance:textfield}
.set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none}
.set-input:focus{border-color:#185FA5;background:#fff}
.set-input.done{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32}
.chk-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #e5e5e5;background:#fafafa;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all 0.15s;font-size:16px}
.chk-btn:active{transform:scale(0.92)}
.chk-btn.on{background:#e8f5e9;border-color:#a5d6a7}
.add-set-btn{margin-top:10px;width:100%;padding:8px;border:1.5px dashed #e0e0e0;border-radius:10px;background:none;color:#aaa;font-size:13px;cursor:pointer;font-weight:500}
.add-set-btn:active{background:#f5f5f5}
.finish-btn{width:100%;margin-top:16px;padding:14px;border-radius:14px;border:none;background:#185FA5;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.finish-btn:active{opacity:0.88}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.hist-card{background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:16px;margin-bottom:12px}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hist-name{font-size:15px;font-weight:600}
.hist-date{font-size:12px;color:#aaa}
.hist-stats{display:flex;gap:20px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.hist-stat-val{font-size:20px;font-weight:600}
.hist-stat-lbl{font-size:11px;color:#aaa;margin-top:1px}
.hist-ex-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f5}
.hist-ex-row:last-child{border:none}
.hist-ex-name{color:#1a1a1a;font-weight:500}
.hist-ex-sets{color:#888}
.empty-state{text-align:center;padding:60px 20px;color:#bbb;font-size:15px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:480px}
.modal h2{font-size:17px;font-weight:600;margin-bottom:16px}
.modal input{width:100%;height:44px;border:1.5px solid #e8e8e8;border-radius:12px;padding:0 14px;font-size:15px;outline:none;margin-bottom:10px;color:#1a1a1a}
.modal input:focus{border-color:#185FA5}
.modal-btns{display:flex;gap:10px;margin-top:6px}
.modal-btns button{flex:1;height:44px;border-radius:12px;border:1.5px solid #e5e5e5;background:#fff;font-size:15px;font-weight:500;cursor:pointer}
.modal-btns .primary{background:#185FA5;color:#fff;border-color:#185FA5}
.back-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-top:8px}
.back-btn{background:none;border:none;cursor:pointer;color:#185FA5;font-size:15px;font-weight:500;padding:0;display:flex;align-items:center;gap:4px}
.screen{display:none}
.screen.active{display:block}
.day-color-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
</style>
</head>
<body>
<div id="toastEl" class="toast"></div>

<div id="mainScreen" class="screen active">
<div class="app">
  <div class="header">
    <h1>💪 Тренировки</h1>
    <button class="icon-btn" onclick="showHistory()">📋 История</button>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="date-row">
    <span>📅</span>
    <label>Дата:</label>
    <input type="date" id="workoutDate" onchange="onDateChange()">
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="exerciseList"></div>
  <button class="finish-btn" onclick="finishWorkout()">✓ Завершить тренировку</button>
</div>
</div>

<div id="histScreen" class="screen">
<div class="app">
  <div class="back-header">
    <button class="back-btn" onclick="showMain()">← Назад</button>
    <h1>История</h1>
  </div>
  <div id="histContent"></div>
</div>
</div>

<div class="modal-bg" id="customModal" onclick="handleModalBg(event)">
  <div class="modal">
    <h2>Своё упражнение</h2>
    <input id="custName" type="text" placeholder="Название упражнения">
    <input id="custMuscle" type="text" placeholder="Группа мышц (например: Ноги / квадрицепс)">
    <div class="modal-btns">
      <button onclick="closeCustomModal()">Отмена</button>
      <button class="primary" onclick="saveCustomModal()">Добавить</button>
    </div>
  </div>
</div>

<script>
const DAYS = [
  {
    key: "legs", name: "Ноги", label: "Ноги", color: "#3B6D11",
    base: [
      {name:"Приседания в тренажёре Смита", muscle:"Ноги / квадрицепс"},
      {name:"Жим ногами в тренажёре", muscle:"Ноги / квадрицепс"},
      {name:"Сгибание ног лёжа (бицепс бедра)", muscle:"Ноги / заднее бедро"},
      {name:"Разгибание ног сидя (квадрицепс)", muscle:"Ноги / переднее бедро"},
      {name:"Подъём на носки стоя (икры)", muscle:"Ноги / икры"},
      {name:"Махи гантелями в стороны", muscle:"Плечи / средний пучок"}
    ]
  },
  {
    key: "chest", name: "Грудь", label: "Грудь", color: "#993C1D",
    base: [
      {name:"Жим штанги лёжа", muscle:"Грудь / трицепс"},
      {name:"Сведение рук в кроссовере", muscle:"Грудь / внутренняя часть"},
      {name:"Жим гантелей в наклоне", muscle:"Грудь / верхний пучок"},
      {name:"Жим в грудном тренажёре (Хаммер)", muscle:"Грудь / средняя часть"},
      {name:"Разгибание рук в блоке сидя (трицепс)", muscle:"Трицепс"},
      {name:"Тяга верёвки вниз (трицепс)", muscle:"Трицепс"}
    ]
  },
  {
    key: "back", name: "Спина", label: "Спина", color: "#185FA5",
    base: [
      {name:"Гиперэкстензия", muscle:"Спина / поясница"},
      {name:"Подтягивания", muscle:"Спина / широчайшие"},
      {name:"Тяга штанги в наклоне", muscle:"Спина / широчайшие"},
      {name:"Тяга горизонтального блока", muscle:"Спина / широчайшие"},
      {name:"Тяга вертикального блока", muscle:"Спина / широчайшие"},
      {name:"Сгибание рук со штангой (бицепс)", muscle:"Бицепс"},
      {name:"Сгибание рук в тренажёре (бицепс)", muscle:"Бицепс"},
      {name:"Сгибание рук с гантелями (бицепс)", muscle:"Бицепс"}
    ]
  },
  {
    key: "free", name: "Свободная", label: "Своб.", color: "#854F0B",
    base: [
      {name:"Планка", muscle:"Кор / пресс"},
      {name:"Скручивания на пресс", muscle:"Пресс"}
    ]
  }
];

const EXERCISE_POOL = {
  legs: [
    {name:"Приседания в тренажёре Смита", muscle:"Ноги / квадрицепс"},
    {name:"Жим ногами в тренажёре", muscle:"Ноги / квадрицепс"},
    {name:"Жим ногами (узкая постановка)", muscle:"Ноги / квадрицепс"},
    {name:"Сгибание ног лёжа (бицепс бедра)", muscle:"Ноги / заднее бедро"},
    {name:"Разгибание ног сидя (квадрицепс)", muscle:"Ноги / переднее бедро"},
    {name:"Подъём на носки стоя (икры)", muscle:"Ноги / икры"},
    {name:"Подъём на носки сидя (икры)", muscle:"Ноги / икры"},
    {name:"Махи гантелями в стороны", muscle:"Плечи / средний пучок"},
    {name:"Выпады со штангой", muscle:"Ноги / квадрицепс"},
    {name:"Румынская тяга", muscle:"Ноги / заднее бедро"},
    {name:"Сведение ног в тренажёре", muscle:"Ноги / приводящие"},
    {name:"Разведение ног в тренажёре", muscle:"Ноги / отводящие"},
    {name:"Приседания со штангой", muscle:"Ноги / квадрицепс"},
    {name:"Болгарские выпады", muscle:"Ноги / квадрицепс"},
    {name:"Гакк-приседания", muscle:"Ноги / квадрицепс"}
  ],
  chest: [
    {name:"Жим штанги лёжа", muscle:"Грудь / трицепс"},
    {name:"Жим гантелей лёжа", muscle:"Грудь"},
    {name:"Сведение рук в кроссовере", muscle:"Грудь / внутренняя часть"},
    {name:"Жим гантелей в наклоне", muscle:"Грудь / верхний пучок"},
    {name:"Жим штанги в наклоне", muscle:"Грудь / верхний пучок"},
    {name:"Жим в грудном тренажёре (Хаммер)", muscle:"Грудь / средняя часть"},
    {name:"Разгибание рук в блоке сидя (трицепс)", muscle:"Трицепс"},
    {name:"Тяга верёвки вниз (трицепс)", muscle:"Трицепс"},
    {name:"Французский жим со штангой", muscle:"Трицепс"},
    {name:"Жим штанги узким хватом", muscle:"Трицепс / грудь"},
    {name:"Разводка гантелей лёжа", muscle:"Грудь"},
    {name:"Отжимания на брусьях", muscle:"Грудь / трицепс"},
    {name:"Кроссовер верхний блок", muscle:"Грудь / нижняя часть"},
    {name:"Пуловер с гантелей", muscle:"Грудь / широчайшие"}
  ],
  back: [
    {name:"Гиперэкстензия", muscle:"Спина / поясница"},
    {name:"Подтягивания", muscle:"Спина / широчайшие"},
    {name:"Тяга штанги в наклоне", muscle:"Спина / широчайшие"},
    {name:"Тяга горизонтального блока", muscle:"Спина / широчайшие"},
    {name:"Тяга вертикального блока", muscle:"Спина / широчайшие"},
    {name:"Тяга гантели одной рукой", muscle:"Спина / широчайшие"},
    {name:"Тяга Т-грифа", muscle:"Спина / широчайшие"},
    {name:"Сгибание рук со штангой (бицепс)", muscle:"Бицепс"},
    {name:"Сгибание рук в тренажёре (бицепс)", muscle:"Бицепс"},
    {name:"Сгибание рук с гантелями (бицепс)", muscle:"Бицепс"},
    {name:"Молотковые сгибания", muscle:"Бицепс / брахиалис"},
    {name:"Шраги со штангой", muscle:"Трапеции"},
    {name:"Тяга к поясу в тренажёре", muscle:"Спина / широчайшие"},
    {name:"Пулловер в блоке", muscle:"Спина / широчайшие"}
  ],
  free: [
    {name:"Планка", muscle:"Кор / пресс"},
    {name:"Скручивания на пресс", muscle:"Пресс"},
    {name:"Подъём ног в висе", muscle:"Пресс / нижний"},
    {name:"Жим гантелей стоя", muscle:"Плечи"},
    {name:"Жим штанги стоя", muscle:"Плечи"},
    {name:"Тяга к подбородку", muscle:"Плечи / трапеции"},
    {name:"Подъём гантелей перед собой", muscle:"Плечи / передний пучок"},
    {name:"Приседания с гантелями", muscle:"Ноги"},
    {name:"Становая тяга", muscle:"Спина / ноги"},
    {name:"Кардио (беговая дорожка)", muscle:"Кардио"},
    {name:"Кардио (велотренажёр)", muscle:"Кардио"},
    {name:"Кардио (эллипс)", muscle:"Кардио"},
    {name:"Берпи", muscle:"Всё тело"},
    {name:"Отжимания", muscle:"Грудь / трицепс"}
  ]
};

let state = JSON.parse(localStorage.getItem('wt_v3') || 'null') || {activeDay:0, sessions:{}, current:{}};
let openSelectIdx = null;
let customTarget = null;

function save() { localStorage.setItem('wt_v3', JSON.stringify(state)); }
function todayStr() { return new Date().toISOString().slice(0,10); }

function initDay(di) {
  if (!state.current[di]) {
    state.current[di] = {
      date: todayStr(),
      exercises: DAYS[di].base.map(ex => ({
        name: ex.name, muscle: ex.muscle,
        sets: [{reps:10,weight:20,done:false},{reps:10,weight:20,done:false},{reps:10,weight:20,done:false}]
      }))
    };
    save();
  }
}

function renderTabs() {
  document.getElementById('dayTabs').innerHTML = DAYS.map((d,i) => {
    const key = state.current[i] && state.current[i].date ? state.current[i].date+'-'+i : '';
    const isDone = state.sessions && Object.keys(state.sessions).some(k=>k.endsWith('-'+i) && state.sessions[k]);
    const isActive = state.activeDay === i;
    return `<button class="day-tab ${isActive?'active':''} ${isDone&&!isActive?'done':''}"
      style="${isActive?'background:'+d.color+';border-color:'+d.color+';':''}"
      onclick="switchDay(${i})">${d.label}</button>`;
  }).join('');
}

function renderExercises() {
  const di = state.activeDay;
  initDay(di);
  const dayData = state.current[di];
  const day = DAYS[di];
  document.getElementById('workoutDate').value = dayData.date || todayStr();
  document.getElementById('progressFill').style.background = day.color;

  const exs = dayData.exercises;
  let total = 0, done = 0;
  exs.forEach(ex => ex.sets.forEach(s => { total++; if(s.done) done++; }));
  document.getElementById('progressFill').style.width = total ? Math.round(done/total*100)+'%' : '0%';

  const pool = EXERCISE_POOL[day.key];

  document.getElementById('exerciseList').innerHTML = exs.map((ex, ei) => `
    <div class="ex-card">
      <div class="ex-top">
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-muscle">${ex.muscle}</div>
        </div>
        <button class="replace-btn" onclick="toggleSel(${di},${ei})" title="Заменить упражнение">⇄</button>
      </div>
      <div class="sel-wrap ${openSelectIdx===ei?'open':''}" id="sel_${ei}">
        <select id="selEx_${ei}">
          <option value="">— выбрать упражнение —</option>
          ${pool.map(e=>`<option value="${e.name}" ${e.name===ex.name?'selected':''}>${e.name}</option>`).join('')}
          <option value="__custom__">✏️ Ввести своё...</option>
        </select>
        <div class="sel-actions">
          <button onclick="cancelSel()">Отмена</button>
          <button class="ok" onclick="confirmSel(${di},${ei})">Заменить</button>
        </div>
      </div>
      <div class="sets-grid">
        <div class="col-hdr">#</div>
        <div class="col-hdr">Повт</div>
        <div class="col-hdr">Вес кг</div>
        <div class="col-hdr">✓</div>
        ${ex.sets.map((s,si) => `
          <div class="set-num">${si+1}</div>
          <input class="set-input${s.done?' done':''}" type="number" inputmode="decimal"
            value="${s.reps}" min="1" max="99" onchange="upd(${di},${ei},${si},'reps',this.value)">
          <input class="set-input${s.done?' done':''}" type="number" inputmode="decimal"
            value="${s.weight}" min="0" max="999" step="2.5" onchange="upd(${di},${ei},${si},'weight',this.value)">
          <button class="chk-btn${s.done?' on':''}" onclick="toggleSet(${di},${ei},${si})">
            ${s.done?'✅':'⬜'}
          </button>
        `).join('')}
      </div>
      <button class="add-set-btn" onclick="addSet(${di},${ei})">+ Добавить подход</button>
    </div>
  `).join('');
}

function switchDay(i) { state.activeDay=i; openSelectIdx=null; save(); renderTabs(); renderExercises(); }

function onDateChange() {
  const di = state.activeDay;
  initDay(di);
  state.current[di].date = document.getElementById('workoutDate').value;
  save();
}

function upd(di,ei,si,field,val) {
  state.current[di].exercises[ei].sets[si][field] = parseFloat(val)||0; save();
}

function toggleSet(di,ei,si) {
  state.current[di].exercises[ei].sets[si].done ^= 1; save(); renderExercises();
}

function addSet(di,ei) {
  const sets = state.current[di].exercises[ei].sets;
  const last = sets[sets.length-1];
  sets.push({reps:last.reps, weight:last.weight, done:false});
  save(); renderExercises();
}

function toggleSel(di,ei) { openSelectIdx = openSelectIdx===ei ? null : ei; renderExercises(); }
function cancelSel() { openSelectIdx=null; renderExercises(); }

function confirmSel(di,ei) {
  const val = document.getElementById('selEx_'+ei).value;
  if (!val) return;
  if (val === '__custom__') { customTarget={di,ei}; document.getElementById('customModal').classList.add('open'); return; }
  const pool = EXERCISE_POOL[DAYS[di].key];
  const found = pool.find(e=>e.name===val);
  if (found) {
    state.current[di].exercises[ei].name = found.name;
    state.current[di].exercises[ei].muscle = found.muscle;
    state.current[di].exercises[ei].sets.forEach(s=>s.done=false);
    save();
  }
  openSelectIdx=null; renderExercises();
}

function handleModalBg(e) { if(e.target===document.getElementById('customModal')) closeCustomModal(); }
function closeCustomModal() { document.getElementById('customModal').classList.remove('open'); openSelectIdx=null; renderExercises(); }
function saveCustomModal() {
  const name = document.getElementById('custName').value.trim();
  const muscle = document.getElementById('custMuscle').value.trim();
  if (!name || !customTarget) return;
  const {di,ei} = customTarget;
  state.current[di].exercises[ei].name = name;
  state.current[di].exercises[ei].muscle = muscle || '';
  state.current[di].exercises[ei].sets.forEach(s=>s.done=false);
  save(); closeCustomModal();
}

function finishWorkout() {
  const di = state.activeDay;
  const dayData = state.current[di];
  let totalSets=0, totalVol=0;
  dayData.exercises.forEach(ex => ex.sets.forEach(s => { if(s.done){totalSets++; totalVol+=s.reps*s.weight;} }));
  if (totalSets===0) { showToast('Отметь хотя бы один подход ✓'); return; }
  const key = (dayData.date||todayStr())+'-'+di;
  state.sessions[key] = {
    date: dayData.date||todayStr(), dayIdx:di,
    dayName: DAYS[di].name, dayColor: DAYS[di].color,
    totalSets, totalVol,
    exercises: JSON.parse(JSON.stringify(dayData.exercises))
  };
  delete state.current[di];
  save();
  showToast('Тренировка сохранена 💪');
  setTimeout(()=>{ renderTabs(); renderExercises(); }, 1200);
}

function showToast(msg) {
  const t=document.getElementById('toastEl'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function showHistory() {
  document.getElementById('mainScreen').classList.remove('active');
  document.getElementById('histScreen').classList.add('active');
  const sessions = Object.values(state.sessions||{}).sort((a,b)=>b.date.localeCompare(a.date));
  if (!sessions.length) {
    document.getElementById('histContent').innerHTML='<div class="empty-state">Пока нет завершённых тренировок</div>';
    return;
  }
  document.getElementById('histContent').innerHTML = sessions.map(s=>`
    <div class="hist-card">
      <div class="hist-top">
        <div class="hist-name" style="color:${s.dayColor||'#1a1a1a'}">${s.dayName}</div>
        <div class="hist-date">${formatDate(s.date)}</div>
      </div>
      <div class="hist-stats">
        <div><div class="hist-stat-val">${s.totalSets}</div><div class="hist-stat-lbl">подходов</div></div>
        <div><div class="hist-stat-val">${(s.totalVol/1000).toFixed(1)}т</div><div class="hist-stat-lbl">объём</div></div>
      </div>
      ${s.exercises.map(ex=>`
        <div class="hist-ex-row">
          <span class="hist-ex-name">${ex.name}</span>
          <span class="hist-ex-sets">${ex.sets.filter(x=>x.done).map(x=>x.reps+'×'+x.weight).join(', ')||'—'}</span>
        </div>`).join('')}
    </div>`).join('');
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}.${m}.${y}`;
}

function showMain() {
  document.getElementById('histScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

renderTabs();
renderExercises();
</script>
</body>
</html>
